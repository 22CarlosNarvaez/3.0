<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Jueguito pa mi bebé 💖</title>

<style>
* {
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  width: 100%;
  height: 100%;
  background: #ffb6c1;
  font-family: Arial, sans-serif;
  position: fixed;
  top: 0;
  left: 0;
}

canvas {
  display: block;
  touch-action: none;
}

#hud {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
  font-size: 18px;
  text-shadow: 1px 1px 3px black;
  pointer-events: none;
}

#message {
  position: absolute;
  top: 80px;
  width: 100%;
  text-align: center;
  font-size: 24px;
  color: white;
  opacity: 0;
  transform: scale(0.6);
  pointer-events: none;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
}

#message.show {
  animation: popMsg 0.6s ease forwards;
}

@keyframes popMsg {
  0%   { opacity: 0; transform: scale(0.6); }
  50%  { opacity: 1; transform: scale(1.3); }
  100% { opacity: 1; transform: scale(1); }
}

#gameOver {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  text-align: center;
  display: none;
  font-size: 28px;
  text-shadow: 1px 1px 3px black;
}

#gameOver button {
  margin-top: 16px;
  padding: 12px 28px;
  font-size: 20px;
  border: none;
  border-radius: 12px;
  background: white;
  color: #e75480;
  font-weight: bold;
  cursor: pointer;
  touch-action: manipulation;
}

#controls {
  position: absolute;
  bottom: 30px;
  left: 30px;
  display: flex;
  gap: 20px;
}

.ctrlBtn {
  width: 70px;
  height: 70px;
  font-size: 30px;
  background: rgba(255,255,255,0.3);
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  touch-action: manipulation;
  display: flex;
  align-items: center;
  justify-content: center;
}

#shootBtn {
  position: absolute;
  bottom: 40px;
  right: 40px;
  width: 70px;
  height: 70px;
  background: red;
  border: none;
  border-radius: 50%;
  color: white;
  font-size: 20px;
  cursor: pointer;
  touch-action: manipulation;
  display: flex;
  align-items: center;
  justify-content: center;
}
</style>
</head>

<body>

<div id="hud">Puntos: 0 | ❤️ Vidas: 3</div>
<div id="message"></div>

<div id="gameOver">
  <div>💔 Game Over</div>
  <div id="finalScore" style="font-size:22px; margin:8px 0;"></div>
  <button id="restartBtn">Reintentar</button>
</div>

<div id="controls">
  <button class="ctrlBtn" id="leftBtn">⬅️</button>
  <button class="ctrlBtn" id="rightBtn">➡️</button>
</div>

<button id="shootBtn">💘</button>

<canvas id="gameCanvas"></canvas>

<audio id="bgMusic" loop preload="auto">
  <source src="audio/Penyair - Parcera x @AlkaProduce  (video oficial).mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let score = 0, lives = 3, bullets = [], enemies = [], isGameOver = false;
let speedMultiplier = 1;

const player = { x: canvas.width / 2, y: canvas.height - 100 };

const faceImg = new Image();
faceImg.src = "img/ella.png";

/* 🎵 MÚSICA */
const music = document.getElementById("bgMusic");
let musicStarted = false;
music.load();

function startMusic() {
  if (!musicStarted) {
    music.volume = 0.7;
    music.play().then(() => { musicStarted = true; }).catch(() => {});
  }
}

document.addEventListener("touchstart", startMusic, { once: true, passive: true });
document.addEventListener("click", startMusic, { once: true });

/* 💬 MENSAJES */
const messages = [
  "Eres increíble ❤️",
  "Eres muy hermosa 😍",
  "Estas bien pendeja también jajaj 💕",
  "Eres lo mejor 💖",
  "Tienes una sonrisa perfecta ✨",
  "Eres única ❤️",
  "Y esos ojitos tan lindos? ✨",
  "TE AMOOOOO ❤️❤️"
];

function showMessage() {
  const el = document.getElementById("message");
  el.innerText = messages[Math.floor(Math.random() * messages.length)];
  el.classList.remove("show");
  void el.offsetWidth;
  el.classList.add("show");
  if (navigator.vibrate) navigator.vibrate(50);
  setTimeout(() => el.classList.remove("show"), 2000);
}

/* ❤️ corazón */
function drawHeart(x, y, size) {
  ctx.fillStyle = "red";
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.bezierCurveTo(x, y - size/2, x - size, y - size/2, x - size, y);
  ctx.bezierCurveTo(x - size, y + size/2, x, y + size, x, y + size);
  ctx.bezierCurveTo(x, y + size, x + size, y + size/2, x + size, y);
  ctx.bezierCurveTo(x + size, y - size/2, x, y - size/2, x, y);
  ctx.fill();
}

function drawCircleImage(img, x, y, size) {
  ctx.save();
  ctx.beginPath();
  ctx.arc(x + size/2, y + size/2, size/2, 0, Math.PI * 2);
  ctx.clip();
  ctx.drawImage(img, x, y, size, size);
  ctx.restore();
}

function shoot() {
  if (!isGameOver) {
    bullets.push({ x: player.x, y: player.y });
  }
}

/* ── Botón disparar (bloquea zoom iOS) ── */
const shootBtn = document.getElementById("shootBtn");
shootBtn.addEventListener("touchstart", function(e) {
  e.preventDefault();
  shoot();
}, { passive: false });
shootBtn.addEventListener("pointerdown", function(e) {
  if (e.pointerType !== "touch") shoot();
});

/* ── Botones de movimiento (bloquea zoom iOS) ── */
let moveLeft = false, moveRight = false;

const leftBtn = document.getElementById("leftBtn");
const rightBtn = document.getElementById("rightBtn");

leftBtn.addEventListener("touchstart",  function(e){ e.preventDefault(); moveLeft = true;  }, { passive: false });
leftBtn.addEventListener("touchend",    function(e){ e.preventDefault(); moveLeft = false; }, { passive: false });
leftBtn.addEventListener("touchcancel", function(e){ e.preventDefault(); moveLeft = false; }, { passive: false });

rightBtn.addEventListener("touchstart",  function(e){ e.preventDefault(); moveRight = true;  }, { passive: false });
rightBtn.addEventListener("touchend",    function(e){ e.preventDefault(); moveRight = false; }, { passive: false });
rightBtn.addEventListener("touchcancel", function(e){ e.preventDefault(); moveRight = false; }, { passive: false });

/* pointerdown para ratón/stylus */
leftBtn.addEventListener("pointerdown",  function(e){ if(e.pointerType!=="touch") moveLeft = true;  });
rightBtn.addEventListener("pointerdown", function(e){ if(e.pointerType!=="touch") moveRight = true; });
window.addEventListener("pointerup", () => { moveLeft = false; moveRight = false; });

/* ── Teclado ── */
window.addEventListener("keydown", function(e) {
  if (e.key === "ArrowLeft")  moveLeft  = true;
  if (e.key === "ArrowRight") moveRight = true;
  if (e.key === " " || e.key === "ArrowUp") shoot();
});
window.addEventListener("keyup", function(e) {
  if (e.key === "ArrowLeft")  moveLeft  = false;
  if (e.key === "ArrowRight") moveRight = false;
});

/* ── Reiniciar ── */
const restartBtn = document.getElementById("restartBtn");
restartBtn.addEventListener("touchstart", function(e){ e.preventDefault(); restartGame(); }, { passive: false });
restartBtn.addEventListener("pointerdown", function(e){ if(e.pointerType!=="touch") restartGame(); });

/* ── Spawn enemigos ── */
function spawnEnemy() {
  if (isGameOver) return;
  enemies.push({
    x: Math.random() * (canvas.width - 80),
    y: -80,
    size: 80,
    speed: (2 + Math.random() * 2) * speedMultiplier
  });
}
setInterval(spawnEnemy, 1200);

function updateHUD() {
  document.getElementById("hud").innerText = `Puntos: ${score} | ❤️ Vidas: ${lives}`;
}

function loseLife() {
  lives--;
  updateHUD();
  if (lives <= 0) {
    isGameOver = true;
    document.getElementById("gameOver").style.display = "block";
    document.getElementById("finalScore").innerText = `Puntuación: ${score}`;
  }
}

/* ── Game loop ── */
function update() {
  if (isGameOver) return;

  if (moveLeft)  player.x -= 5;
  if (moveRight) player.x += 5;

  for (let i = bullets.length - 1; i >= 0; i--) {
    bullets[i].y -= 8;
    if (bullets[i].y < 0) { bullets.splice(i, 1); continue; }

    let hit = false;
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      const b = bullets[i];
      if (b && b.x < e.x + e.size && b.x > e.x && b.y < e.y + e.size && b.y > e.y) {
        enemies.splice(j, 1);
        bullets.splice(i, 1);
        score++;
        updateHUD();
        if (score % 10 === 0) showMessage();
        if (score % 15 === 0) speedMultiplier += 0.3;
        hit = true;
        break;
      }
    }
    if (hit) continue;
  }

  for (let i = enemies.length - 1; i >= 0; i--) {
    enemies[i].y += enemies[i].speed;
    if (enemies[i].y > canvas.height) {
      enemies.splice(i, 1);
      loseLife();
    }
  }

  const margin = 30;
  player.x = Math.max(margin, Math.min(canvas.width - margin, player.x));
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawHeart(player.x, player.y, 30);
  bullets.forEach(b => drawHeart(b.x, b.y, 12));
  enemies.forEach(e => drawCircleImage(faceImg, e.x, e.y, e.size));
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}
gameLoop();

function restartGame() {
  score = 0;
  lives = 3;
  bullets = [];
  enemies = [];
  isGameOver = false;
  speedMultiplier = 1;
  document.getElementById("gameOver").style.display = "none";
  updateHUD();
}

updateHUD();
</script>
</body>
</html>
